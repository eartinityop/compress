name: Video Compressor (Channel Method)

on:
  workflow_dispatch:
    inputs:
      channel_username:
        description: 'Channel username (where video was forwarded)'
        required: true
      fwd_message_id:
        description: 'Message ID of forwarded video in channel'
        required: true
      user_id:
        description: 'Original user chat ID (for sending progress/compressed video)'
        required: true
      quality:
        description: 'Target height (240/360/480/720/1080)'
        required: true
      message_id:
        description: 'Progress message ID to update'
        required: true

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      USER_CHAT_ID: ${{ github.event.inputs.user_id }}
      MSG_ID: ${{ github.event.inputs.message_id }}
      QUALITY: ${{ github.event.inputs.quality }}

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc python3-pip

      - name: Install Python packages
        run: pip install pyrogram tgcrypto requests

      - name: Update Telegram with runner specs
        run: |
          CPU=$(lscpu | grep "Model name" | cut -d: -f2 | xargs)
          RAM=$(free -h | awk '/Mem:/ {print $2}')
          DISK=$(df -h / | awk 'NR==2 {print $2}')
          OS=$(cat /etc/os-release | grep PRETTY_NAME | cut -d'"' -f2)
          MESSAGE="🖥 *Runner Specs:*\n• OS: ${OS}\n• CPU: ${CPU}\n• RAM: ${RAM}\n• Storage: ${DISK}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"

      - name: Download video from channel using Pyrogram
        id: download
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_B64: ${{ secrets.USER_SESSION_BASE64 }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
          FWD_MSG_ID: ${{ github.event.inputs.fwd_message_id }}
        run: |
          echo "$SESSION_B64" | base64 -d > my_account.session
          python -c "
          import os, asyncio, requests
          from pyrogram import Client

          BOT_TOKEN = os.environ['BOT_TOKEN']
          USER_CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          CHANNEL_USERNAME = int(os.environ['CHANNEL_USERNAME'])
          FWD_MSG_ID = int(os.environ['FWD_MSG_ID'])

          def update_message(text):
              requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json={
                  'chat_id': USER_CHAT_ID,
                  'message_id': MSG_ID,
                  'text': text,
                  'parse_mode': 'Markdown'
              })

          async def progress(current, total):
              percent = int(current * 100 / total) if total else 0
              bar_len = 20
              filled = int(percent * bar_len / 100)
              bar = '█' * filled + '░' * (bar_len - filled)
              update_message(f'📥 *Downloading...* [{bar}] {percent}%')

          async def main():
              app = Client('my_account', api_id=int(os.environ['API_ID']),
                           api_hash=os.environ['API_HASH'])
              await app.start()
              # Force access to channel (you are admin, always succeeds)
              chat = await app.get_chat(CHANNEL_USERNAME)
              msg = await app.get_messages(chat.id, FWD_MSG_ID)
              if msg and (msg.video or msg.document):
                  await msg.download(file_name='original.mp4', progress=progress)
                  update_message('✅ *Download complete!*')
              else:  
                  update_message('❌ *Video not found in channel.*')
              await app.stop()

          asyncio.run(main())
          "

      - name: Handle download failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Download failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      - name: Compress video
        id: compress
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🎞 *Compressing to ${QUALITY}p...*" \
            -d "parse_mode=Markdown"
          ffmpeg -y -i original.mp4 -vf "scale=-2:${QUALITY}" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k compressed.mp4 2>/tmp/ffmpeg.log
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=✅ *Compressed successfully!*" \
            -d "parse_mode=Markdown"

      - name: Handle compression failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Compression failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      - name: Upload compressed video with progress
        id: upload
        run: |
          curl -# -F "video=@compressed.mp4" \
               -F "caption=Here is your compressed video (${QUALITY}p)" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendVideo" 2>&1 | \
          while IFS= read -r line; do
            if [[ "$line" =~ % ]]; then
              percent=$(echo "$line" | grep -oP '\d+(\.\d+)?%' | head -1)
              num=${percent%\%}
              filled=$((num * 20 / 100))
              bar=$(printf "%0.s█" $(seq 1 $filled))
              empty=$(printf "%0.s░" $(seq 1 $((20 - filled))))
              if (( num % 5 == 0 )); then
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
                  -d "chat_id=${USER_CHAT_ID}" \
                  -d "message_id=${MSG_ID}" \
                  -d "text=📤 *Uploading...* [${bar}${empty}] ${percent}" \
                  -d "parse_mode=Markdown" > /dev/null
              fi
            fi
          done
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🎉 *Video sent successfully!*" \
            -d "parse_mode=Markdown"

      - name: Handle upload failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Upload failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      - name: Final completion message
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🏁 *All steps completed successfully!*" \
            -d "parse_mode=Markdown"

name: Video Compressor (Group + Local API)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Telegram file_id of the video'
        required: true
      chat_id:
        description: 'Group chat ID (where to send results & updates)'
        required: true
      quality:
        description: 'Target height (240/360/480/720/1080)'
        required: true
      original_message_id:
        description: 'Original video message ID (for reply)'
        required: true
      custom_name:
        description: 'Custom name for the compressed file'
        required: false
        default: 'video'
      original_caption:
        description: 'Original video caption'
        required: false
        default: ''

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      WORKER_BOT_TOKEN: ${{ secrets.WORKER_BOT_TOKEN }}
      API_ID: ${{ secrets.API_ID }}
      API_HASH: ${{ secrets.API_HASH }}
      CHAT_ID: ${{ github.event.inputs.chat_id }}
      QUALITY: ${{ github.event.inputs.quality }}
      ORIGINAL_CAPTION: ${{ github.event.inputs.original_caption }}
      CUSTOM_NAME: ${{ github.event.inputs.custom_name }}
      ORIGINAL_MSG_ID: ${{ github.event.inputs.original_message_id }}
      BINARY_URL: "https://github.com/eartinityop/compress/releases/download/botapi-binary/telegram-bot-api-linux-amd64"

    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq bc python3-pip

      - name: Download and start local Bot API server
        run: |
          mkdir -p /tmp/telegram-bot-api
          wget -q -O telegram-bot-api "$BINARY_URL"
          chmod +x telegram-bot-api
          ./telegram-bot-api --api-id $API_ID --api-hash $API_HASH --http-port 8081 --dir /tmp/telegram-bot-api --local &
          # Wait for the server to be ready
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8081/getMe | grep -q '"ok":true'; then
              echo "Local API server ready."
              break
            fi
            sleep 1
          done

      - name: Create output directory
        run: mkdir -p compress

      # ---------- Send initial progress message (worker bot) ----------
      - name: Send progress message (worker bot)
        id: progress_msg
        run: |
          API_URL="http://127.0.0.1:8081/bot${WORKER_BOT_TOKEN}"
          RESPONSE=$(curl -s -X POST "$API_URL/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            -d "text=⏳ Processing started..." \
            -d "parse_mode=Markdown")
          echo "PROGRESS_MSG_ID=$(echo "$RESPONSE" | jq -r '.result.message_id')" >> $GITHUB_ENV

      # ---------- Download video (progress every 10s) ----------
      - name: Download video via local Bot API
        run: |
          API_URL="http://127.0.0.1:8081/bot${WORKER_BOT_TOKEN}"
          FILE_PATH=$(curl -s "$API_URL/getFile?file_id=${{ github.event.inputs.file_id }}" | jq -r '.result.file_path')
          if [ -z "$FILE_PATH" ] || [ "$FILE_PATH" = "null" ]; then
            curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" -d "text=❌ Failed to get file path." -d "parse_mode=Markdown"
            exit 1
          fi
          OUTPUT="compress/original.mp4"
          curl -# -L -o "$OUTPUT" "$API_URL/file/$FILE_PATH" 2>/tmp/download_progress.txt &
          CURL_PID=$!
          while kill -0 $CURL_PID 2>/dev/null; do
            sleep 10
            if [ -f "$OUTPUT" ]; then
              CURRENT_SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
              TOTAL_SIZE=$(grep -i "content-length" /tmp/download_progress.txt | tail -1 | awk '{print $2}' | tr -d '\r')
              if [ -n "$TOTAL_SIZE" ] && [ "$TOTAL_SIZE" -gt 0 ]; then
                PERCENT=$(( CURRENT_SIZE * 100 / TOTAL_SIZE ))
                TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)
              else
                PERCENT=0
                TOTAL_MB="?"
              fi
              CUR_MB=$(echo "scale=2; $CURRENT_SIZE/1048576" | bc)
              BARS=20
              FILLED=$(( PERCENT * BARS / 100 ))
              BAR=$(printf "%0.s█" $(seq 1 $FILLED))
              BAR+=$(printf "%0.s░" $(seq 1 $((BARS - FILLED))))
              curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
                -d "text=📥 Downloading... [${BAR}] ${PERCENT}%\n(${CUR_MB} / ${TOTAL_MB} MB)" -d "parse_mode=Markdown"
            fi
          done
          wait $CURL_PID
          curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" -d "text=✅ Download complete!" -d "parse_mode=Markdown"

      - name: Verify download
        run: |
          API_URL="http://127.0.0.1:8081/bot${WORKER_BOT_TOKEN}"
          if [ ! -f compress/original.mp4 ]; then
            curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" -d "text=❌ Verification failed." -d "parse_mode=Markdown"
            exit 1
          fi
          SIZE=$(du -sh compress/original.mp4 | cut -f1)
          curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" -d "text=✅ File verified (${SIZE})" -d "parse_mode=Markdown"

      - name: Compress video
        id: compress
        run: |
          API_URL="http://127.0.0.1:8081/bot${WORKER_BOT_TOKEN}"
          curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" -d "text=🎞 Compressing to ${QUALITY}p..." -d "parse_mode=Markdown"
          echo "COMPRESS_START=$(date +%s)" >> $GITHUB_ENV

          SAFE_NAME=$(echo "$CUSTOM_NAME" | sed 's/[^a-zA-Z0-9_\-]//g' | cut -c1-50)
          [ -z "$SAFE_NAME" ] && SAFE_NAME="video"
          FINAL_NAME="${SAFE_NAME}_${QUALITY}p.mp4"

          if ffmpeg -y -i compress/original.mp4 -vf "scale=-2:${QUALITY}" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k "compress/${FINAL_NAME}" 2>/tmp/ffmpeg.log; then
            echo "COMPRESSED_NAME=${FINAL_NAME}" >> $GITHUB_ENV
            curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" -d "text=✅ Compressed successfully!" -d "parse_mode=Markdown"
          else
            FFLOG=$(tail -n 20 /tmp/ffmpeg.log)
            ESCAPED=$(echo "$FFLOG" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
            curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" -d "text=❌ Compression failed! \`\`\`${ESCAPED}\`\`\`" -d "parse_mode=Markdown"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: compressed-${{ github.event.inputs.chat_id }}-${{ github.run_id }}
          path: compress/${{ env.COMPRESSED_NAME }}
          retention-days: 7

      - name: Send compressed video to group (reply)
        env:
          COMPRESSED_NAME: ${{ env.COMPRESSED_NAME }}
          COMPRESS_START: ${{ env.COMPRESS_START }}
        run: |
          API_URL="http://127.0.0.1:8081/bot${WORKER_BOT_TOKEN}"
          FILE="compress/${COMPRESSED_NAME}"
          [ ! -f "$FILE" ] && exit 1

          COMPRESS_END=$(date +%s)
          ELAPSED=$(( COMPRESS_END - COMPRESS_START ))
          MINS=$(( ELAPSED / 60 ))
          SECS=$(( ELAPSED % 60 ))
          CAPTION="Quality: ${QUALITY}p | Time: ${MINS}m ${SECS}s"
          [ -n "${ORIGINAL_CAPTION}" ] && CAPTION="${ORIGINAL_CAPTION} - ${CAPTION}"

          curl -s -X POST "$API_URL/sendVideo" \
            -F "chat_id=$CHAT_ID" \
            -F "video=@$FILE" \
            -F "caption=$CAPTION" \
            -F "reply_to_message_id=$ORIGINAL_MSG_ID" \
            -F "parse_mode=Markdown" > /tmp/send_resp.json

          if grep -q '"ok":true' /tmp/send_resp.json; then
            curl -s -X POST "$API_URL/deleteMessage" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID"
          else
            ERROR=$(jq -r '.description' /tmp/send_resp.json)
            curl -s -X POST "$API_URL/editMessageText" -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" -d "text=❌ Upload failed: $ERROR" -d "parse_mode=Markdown"
            exit 1
          fi

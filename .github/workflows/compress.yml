name: Video Compressor with MTProto Download

on:
  workflow_dispatch:
    inputs:
      fwd_message_id:
        description: 'Forwarded message ID in group'
        required: true
      group_chat_id:
        description: 'Private group chat ID'
        required: true
      user_chat_id:
        description: 'Original user chat ID'
        required: true
      quality:
        description: 'Target height (240/360/480/720/1080)'
        required: true
      message_id:
        description: 'Message ID to update progress'
        required: true

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    # Environment variables reused by many steps
    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      USER_CHAT_ID: ${{ github.event.inputs.user_chat_id }}
      MSG_ID: ${{ github.event.inputs.message_id }}
      QUALITY: ${{ github.event.inputs.quality }}

    steps:
      # ------------------------------------------------------------------
      # 🔧 Setup
      # ------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc python3-pip

      - name: Install Python packages
        run: pip install pyrogram tgcrypto requests

      # ------------------------------------------------------------------
      # 🖥 Show runner specs
      # ------------------------------------------------------------------
      - name: Update Telegram with runner specs
        run: |
          CPU=$(lscpu | grep "Model name" | cut -d: -f2 | xargs)
          RAM=$(free -h | awk '/Mem:/ {print $2}')
          DISK=$(df -h / | awk 'NR==2 {print $2}')
          OS=$(cat /etc/os-release | grep PRETTY_NAME | cut -d'"' -f2)
          MESSAGE="🖥 *Runner Specs:*\n• OS: ${OS}\n• CPU: ${CPU}\n• RAM: ${RAM}\n• Storage: ${DISK}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"

      # ------------------------------------------------------------------
      # 📥 Download via Pyrogram (MTProto) – unlimited size
      # ------------------------------------------------------------------
      - name: Download video using Pyrogram (MTProto)
        id: download
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.USER_SESSION_STRING }}
          FWD_MSG_ID: ${{ github.event.inputs.fwd_message_id }}
          GROUP_CHAT_ID: ${{ github.event.inputs.group_chat_id }}
        run: |
          python -c "
          import os, time, requests, asyncio
          from pyrogram import Client

          BOT_TOKEN = os.environ['BOT_TOKEN']
          USER_CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          GROUP_CHAT_ID = int(os.environ['GROUP_CHAT_ID'])
          FWD_MSG_ID = int(os.environ['FWD_MSG_ID'])

          def update_message(text):
              requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json={
                  'chat_id': USER_CHAT_ID,
                  'message_id': MSG_ID,
                  'text': text,
                  'parse_mode': 'Markdown'
              })

          async def progress(current, total):
              percent = int(current * 100 / total) if total else 0
              bar_len = 20
              filled = int(percent * bar_len / 100)
              bar = '█' * filled + '░' * (bar_len - filled)
              update_message(f'📥 *Downloading...* [{bar}] {percent}%')

          async def main():
              app = Client('session', api_id=int(os.environ['API_ID']),
                           api_hash=os.environ['API_HASH'],
                           session_string=os.environ['SESSION_STRING'])
              await app.start()
              msg = await app.get_messages(GROUP_CHAT_ID, FWD_MSG_ID)
              await msg.download(file_name='original.mp4', progress=progress)
              await app.stop()
              update_message('✅ *Download complete!*')

          asyncio.run(main())
          "

      # ⛔ If download fails – update message and stop
      - name: Handle download failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Download failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      # ------------------------------------------------------------------
      # 🎞 Compress with FFmpeg
      # ------------------------------------------------------------------
      - name: Compress video
        id: compress
        run: |
          # Status update: compressing
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🎞 *Compressing to ${QUALITY}p...*" \
            -d "parse_mode=Markdown"

          ffmpeg -y -i original.mp4 -vf "scale=-2:${QUALITY}" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k compressed.mp4 2>/tmp/ffmpeg.log

          # Compression finished
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=✅ *Compressed successfully!*" \
            -d "parse_mode=Markdown"

      # ⛔ If compression fails – update message and stop
      - name: Handle compression failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Compression failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      # ------------------------------------------------------------------
      # 📤 Upload compressed video back to user
      # ------------------------------------------------------------------
      - name: Upload compressed video with progress
        id: upload
        run: |
          # Upload with progress parsing
          curl -# -F "video=@compressed.mp4" \
               -F "caption=Here is your compressed video (${QUALITY}p)" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendVideo" 2>&1 | \
          while IFS= read -r line; do
            if [[ "$line" =~ % ]]; then
              percent=$(echo "$line" | grep -oP '\d+(\.\d+)?%' | head -1)
              num=${percent%\%}
              filled=$((num * 20 / 100))
              bar=$(printf "%0.s█" $(seq 1 $filled))
              empty=$(printf "%0.s░" $(seq 1 $((20 - filled))))
              # Update every 5% to avoid rate limits
              if (( num % 5 == 0 )); then
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
                  -d "chat_id=${USER_CHAT_ID}" \
                  -d "message_id=${MSG_ID}" \
                  -d "text=📤 *Uploading...* [${bar}${empty}] ${percent}" \
                  -d "parse_mode=Markdown" > /dev/null
              fi
            fi
          done
          # Final success
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🎉 *Video sent successfully!*" \
            -d "parse_mode=Markdown"

      # ⛔ If upload fails – update message and stop
      - name: Handle upload failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Upload failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      # ------------------------------------------------------------------
      # 🎯 Final step – job completed (only if all above succeeded)
      # ------------------------------------------------------------------
      - name: Final completion message
        if: success()
        run: |
          # Already updated by upload step, but we can send an extra line if desired.
          # This just ensures the user sees a final "Job finished" status.
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🏁 *All steps completed successfully!*" \
            -d "parse_mode=Markdown"

name: Video Compressor (Final – Folder + Speed)

on:
  workflow_dispatch:
    inputs:
      channel_username:
        description: 'Username of the private channel (without @)'
        required: true
      fwd_message_id:
        description: 'Message ID of forwarded video in channel'
        required: true
      user_id:
        description: 'Original user chat ID (for progress & compressed video)'
        required: true
      quality:
        description: 'Target height (240/360/480/720/1080)'
        required: true
      message_id:
        description: 'Progress message ID to update'
        required: true

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      USER_CHAT_ID: ${{ github.event.inputs.user_id }}
      MSG_ID: ${{ github.event.inputs.message_id }}
      QUALITY: ${{ github.event.inputs.quality }}

    steps:
      # ------------------------------------------------------------------
      # 🔧 Setup
      # ------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc python3-pip

      - name: Install Python packages
        run: pip install pyrogram tgcrypto requests

      - name: Create output directory
        run: mkdir -p compress

      # ------------------------------------------------------------------
      # 🖥 Runner specs
      # ------------------------------------------------------------------
      - name: Update Telegram with runner specs
        run: |
          CPU=$(lscpu | grep "Model name" | cut -d: -f2 | xargs)
          RAM=$(free -h | awk '/Mem:/ {print $2}')
          DISK=$(df -h / | awk 'NR==2 {print $2}')
          OS=$(cat /etc/os-release | grep PRETTY_NAME | cut -d'"' -f2)
          MESSAGE="🖥 *Runner Specs:*\n• OS: ${OS}\n• CPU: ${CPU}\n• RAM: ${RAM}\n• Storage: ${DISK}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"

      # ------------------------------------------------------------------
      # 📥 Download with progress (speed + size)
      # ------------------------------------------------------------------
      - name: Download video from channel using Pyrogram
        id: download
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_B64: ${{ secrets.USER_SESSION_BASE64 }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
          FWD_MSG_ID: ${{ github.event.inputs.fwd_message_id }}
        run: |
          echo "$SESSION_B64" | base64 -d > my_account.session
          python -c "
          import os, asyncio, requests, time
          from pyrogram import Client

          BOT_TOKEN = os.environ['BOT_TOKEN']
          USER_CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          CHANNEL_USERNAME = os.environ['CHANNEL_USERNAME']
          FWD_MSG_ID = int(os.environ['FWD_MSG_ID'])
          OUTPUT_FILE = 'compress/original.mp4'

          state = {'last_bytes': 0, 'last_time': time.time()}

          def update_message(text):
              requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json={
                  'chat_id': USER_CHAT_ID,
                  'message_id': MSG_ID,
                  'text': text,
                  'parse_mode': 'Markdown'
              })

          async def progress(current, total):
              now = time.time()
              elapsed = now - state['last_time']
              if elapsed < 1:  # update max once per second
                  return
              speed = (current - state['last_bytes']) / elapsed if elapsed > 0 else 0
              speed_mb = speed / 1048576
              percent = int(current * 100 / total) if total else 0
              total_mb = total / 1048576
              current_mb = current / 1048576
              bar_len = 20
              filled = int(percent * bar_len / 100)
              bar = '█' * filled + '░' * (bar_len - filled)
              update_message(
                  f'📥 *Downloading...* [{bar}] {percent}%\n'
                  f'({current_mb:.1f} / {total_mb:.1f} MB)  ⚡ {speed_mb:.1f} MB/s'
              )
              state['last_time'] = now
              state['last_bytes'] = current

          async def main():
              app = Client('my_account', api_id=int(os.environ['API_ID']),
                           api_hash=os.environ['API_HASH'])
              await app.start()
              channel = await app.get_chat(CHANNEL_USERNAME)
              msg = await app.get_messages(channel.id, FWD_MSG_ID)
              if not msg or not msg.media:
                  update_message('❌ *Video not found in channel.*')
              else:
                  await msg.download(file_name=OUTPUT_FILE, progress=progress)
                  update_message('✅ *Download complete!*')
              await app.stop()

          asyncio.run(main())
          "

      - name: Handle download failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Download failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      # ------------------------------------------------------------------
      # ✅ Verify downloaded file
      # ------------------------------------------------------------------
      - name: Verify downloaded file exists
        id: verify
        run: |
          if [ ! -f compress/original.mp4 ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" \
              -d "message_id=${MSG_ID}" \
              -d "text=❌ *Verification failed: original.mp4 not found.*" \
              -d "parse_mode=Markdown"
            exit 1
          else
            SIZE=$(du -sh compress/original.mp4 | cut -f1)
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" \
              -d "message_id=${MSG_ID}" \
              -d "text=✅ *File verified* (${SIZE})" \
              -d "parse_mode=Markdown"
          fi

      - name: Handle verification failure
        if: failure() && steps.verify.outcome == 'failure'
        run: exit 1

      # ------------------------------------------------------------------
      # 🎞 Compression
      # ------------------------------------------------------------------
      - name: Compress video
        id: compress
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🎞 *Compressing to ${QUALITY}p...*" \
            -d "parse_mode=Markdown"

          if ffmpeg -y -i compress/original.mp4 -vf "scale=-2:${QUALITY}" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k compress/compressed.mp4 2>/tmp/ffmpeg.log; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" \
              -d "message_id=${MSG_ID}" \
              -d "text=✅ *Compressed successfully!*" \
              -d "parse_mode=Markdown"
          else
            FFLOG=$(tail -n 30 /tmp/ffmpeg.log 2>/dev/null || echo "Could not read log")
            ESCAPED_LOG=$(echo "$FFLOG" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" \
              -d "message_id=${MSG_ID}" \
              -d "text=❌ *Compression failed!* Error log:\n\`\`\`${ESCAPED_LOG}\`\`\`" \
              -d "parse_mode=Markdown"
            exit 1
          fi

      - name: Handle compression failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Compression failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      # ------------------------------------------------------------------
      # 📤 Upload compressed video with progress
      # ------------------------------------------------------------------
      - name: Upload compressed video with progress
        id: upload
        run: |
          curl -# -F "video=@compress/compressed.mp4" \
               -F "caption=Here is your compressed video (${QUALITY}p)" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendVideo" 2>&1 | \
          while IFS= read -r line; do
            if [[ "$line" =~ % ]]; then
              percent=$(echo "$line" | grep -oP '\d+(\.\d+)?%' | head -1)
              num=$(echo "${percent%\%}" | cut -d'.' -f1)
              filled=$((num * 20 / 100))
              bar=$(printf "%0.s█" $(seq 1 $filled))
              empty=$(printf "%0.s░" $(seq 1 $((20 - filled))))
              if (( num % 5 == 0 )); then
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
                  -d "chat_id=${USER_CHAT_ID}" \
                  -d "message_id=${MSG_ID}" \
                  -d "text=📤 *Uploading...* [${bar}${empty}] ${percent}" \
                  -d "parse_mode=Markdown" > /dev/null
              fi
            fi
          done
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🎉 *Video sent successfully!*" \
            -d "parse_mode=Markdown"

      - name: Handle upload failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=❌ *Upload failed. Process stopped.*" \
            -d "parse_mode=Markdown"
          exit 1

      - name: Final completion message
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🏁 *All steps completed successfully!*" \
            -d "parse_mode=Markdown"

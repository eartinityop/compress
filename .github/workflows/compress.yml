name: Video Compressor with Real-time Progress

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Telegram file_id'
        required: true
      chat_id:
        description: 'Chat ID'
        required: true
      quality:
        description: 'Target height (e.g. 720)'
        required: true
      message_id:
        description: 'Message ID to update'
        required: true

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3 hours, adjust if needed

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc

      # ---------- UPDATE RUNNER SPECS ----------
      - name: Update Telegram message with runner specs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MSG_ID: ${{ github.event.inputs.message_id }}
        run: |
          CPU=$(lscpu | grep "Model name" | cut -d: -f2 | xargs)
          RAM=$(free -h | awk '/Mem:/ {print $2}')
          DISK=$(df -h / | awk 'NR==2 {print $2}')
          OS=$(cat /etc/os-release | grep PRETTY_NAME | cut -d'"' -f2)
          MESSAGE="🖥 *Runner Specs:*
          • OS: ${OS}
          • CPU: ${CPU}
          • RAM: ${RAM}
          • Storage: ${DISK}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"

      # ---------- GET FILE PATH ----------
      - name: Get Telegram file download URL
        id: getfile
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          FILE_INFO=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getFile?file_id=${{ github.event.inputs.file_id }}")
          FILE_PATH=$(echo $FILE_INFO | jq -r '.result.file_path')
          echo "file_path=${FILE_PATH}" >> $GITHUB_OUTPUT

      # ---------- DOWNLOAD WITH PROGRESS ----------
      - name: Download original video with progress updates
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MSG_ID: ${{ github.event.inputs.message_id }}
          FILE_PATH: ${{ steps.getfile.outputs.file_path }}
        run: |
          set -euo pipefail
          URL="https://api.telegram.org/file/bot${TELEGRAM_BOT_TOKEN}/${FILE_PATH}"
          OUT="original.mp4"

          # Start download in background, writing stderr to a file
          curl -# -L -o "${OUT}" "${URL}" 2> /tmp/progress.txt &
          CURL_PID=$!

          LAST_SIZE=0
          LAST_TIME=$(date +%s)
          while kill -0 $CURL_PID 2>/dev/null; do
            sleep 2
            if [ -f /tmp/progress.txt ]; then
              # Extract the last line which contains the progress bar
              LINE=$(tail -n 1 /tmp/progress.txt | tr '\r' '\n' | tail -n 1)
              # Typical curl progress: "########                         25.0%"
              PERCENT=$(echo "$LINE" | grep -oP '\d+(\.\d+)?%' | head -1 | tr -d '%')
              # Download size (e.g., "156M")
              DL_SIZE=$(echo "$LINE" | grep -oP '\d+(\.\d+)?[KMGT]' | tail -1 || echo "")
              if [ -z "$PERCENT" ]; then
                PERCENT=0
              fi
              # Calculate speed
              CURRENT_SIZE=$(stat -c%s "${OUT}" 2>/dev/null || echo 0)
              NOW=$(date +%s)
              ELAPSED=$(( NOW - LAST_TIME ))
              if [ $ELAPSED -gt 0 ]; then
                SPEED_BYTES=$(( (CURRENT_SIZE - LAST_SIZE) / ELAPSED ))
                SPEED_MB=$(echo "scale=2; ${SPEED_BYTES}/1048576" | bc)
              else
                SPEED_MB=0
              fi
              LAST_SIZE=${CURRENT_SIZE}
              LAST_TIME=${NOW}
              # Build progress bar (20 chars)
              BARS=20
              FILLED=$(echo "scale=0; ${PERCENT}/5" | bc)  # 20 chars = 5% each
              EMPTY=$(( BARS - FILLED ))
              BAR=$(printf "%0.s█" $(seq 1 $FILLED))
              BAR+=$(printf "%0.s░" $(seq 1 $EMPTY))
              # Edit message
              MESSAGE="📥 *Downloading...* [${BAR}] ${PERCENT}%\n⚡ Speed: ${SPEED_MB} MB/s"
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
                -d "chat_id=${CHAT_ID}" \
                -d "message_id=${MSG_ID}" \
                -d "text=${MESSAGE}" \
                -d "parse_mode=Markdown" > /dev/null
            fi
          done
          wait $CURL_PID
          # Final download complete message
          MESSAGE="✅ *Download complete!*"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"

      # ---------- COMPRESS WITH LIVE SPEED ----------
      - name: Compress video with ffmpeg (live speed)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MSG_ID: ${{ github.event.inputs.message_id }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          # Update message to "Compressing..."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🎞 *Compressing to ${QUALITY}p...*" \
            -d "parse_mode=Markdown"

          # Start ffmpeg, capturing stderr which contains progress
          ffmpeg -y -i original.mp4 -vf "scale=-2:${QUALITY}" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k compressed.mp4 2> /tmp/ffmpeg.log &
          FFMPEG_PID=$!

          # Periodically parse speed from log and update
          while kill -0 $FFMPEG_PID 2>/dev/null; do
            sleep 3
            if [ -f /tmp/ffmpeg.log ]; then
              # Extract last speed= line
              SPEED=$(grep -oP 'speed=\s*[\d.]+x' /tmp/ffmpeg.log | tail -1 | tr -d ' ')
              [ -z "$SPEED" ] && SPEED="calculating..."
              MESSAGE="🎞 *Compressing...* (speed: ${SPEED})"
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
                -d "chat_id=${CHAT_ID}" \
                -d "message_id=${MSG_ID}" \
                -d "text=${MESSAGE}" \
                -d "parse_mode=Markdown" > /dev/null
            fi
          done
          wait $FFMPEG_PID
          # Compression done
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=✅ *Compressed successfully!*" \
            -d "parse_mode=Markdown"

      # ---------- UPLOAD WITH PROGRESS ----------
      - name: Upload compressed video with progress
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MSG_ID: ${{ github.event.inputs.message_id }}
        run: |
          # Start upload with progress bar to stderr
          curl -# -F "video=@compressed.mp4" \
                  -F "caption=Here is your compressed video (${QUALITY}p)" \
                  "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" 2> /tmp/upload_progress.txt &
          CURL_PID=$!

          LAST_SIZE=0
          LAST_TIME=$(date +%s)
          while kill -0 $CURL_PID 2>/dev/null; do
            sleep 2
            LINE=$(tail -n 1 /tmp/upload_progress.txt | tr '\r' '\n' | tail -n 1)
            PERCENT=$(echo "$LINE" | grep -oP '\d+(\.\d+)?%' | head -1 | tr -d '%')
            [ -z "$PERCENT" ] && PERCENT=0
            UPLOADED_SIZE=$(echo "$LINE" | grep -oP '\d+(\.\d+)?[KMGT]' | tail -1 || echo "")
            # Speed calculation (using compressed.mp4 size?)
            CURRENT_SIZE=$(stat -c%s compressed.mp4 2>/dev/null || echo 0)
            # Upload progress not based on file size on disk. Instead track response body length? Easier: use size of compressed file and assume it's being uploaded.
            # However, we don't know uploaded bytes directly. We'll approximate using PERCENT of file size.
            TOTAL_BYTES=$(stat -c%s compressed.mp4)
            NOW=$(date +%s)
            ELAPSED=$(( NOW - LAST_TIME ))
            # Use percentage to guess uploaded bytes
            UPLOADED_BYTES=$(echo "scale=0; ${TOTAL_BYTES} * ${PERCENT} / 100" | bc)
            if [ $ELAPSED -gt 0 ] && [ -n "$UPLOADED_BYTES" ] && [ "$LAST_SIZE" -ne 0 ]; then
              SPEED_BYTES=$(( (UPLOADED_BYTES - LAST_SIZE) / ELAPSED ))
              SPEED_MB=$(echo "scale=2; ${SPEED_BYTES}/1048576" | bc)
            else
              SPEED_MB="..."
              LAST_SIZE=0
            fi
            LAST_SIZE=${UPLOADED_BYTES}
            LAST_TIME=${NOW}
            BARS=20
            FILLED=$(echo "scale=0; ${PERCENT}/5" | bc)
            EMPTY=$(( BARS - FILLED ))
            BAR=$(printf "%0.s█" $(seq 1 $FILLED))
            BAR+=$(printf "%0.s░" $(seq 1 $EMPTY))
            MESSAGE="📤 *Uploading...* [${BAR}] ${PERCENT}%\n⚡ Speed: ${SPEED_MB} MB/s"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
              -d "chat_id=${CHAT_ID}" \
              -d "message_id=${MSG_ID}" \
              -d "text=${MESSAGE}" \
              -d "parse_mode=Markdown" > /dev/null
          done
          wait $CURL_PID

          # Final message: video sent
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_id=${MSG_ID}" \
            -d "text=🎉 *Video sent successfully!*" \
            -d "parse_mode=Markdown"

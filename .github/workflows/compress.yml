name: Video Compressor (Cancel Anywhere + Fallback)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Telegram file_id'
        required: true
      user_id:
        description: 'User chat ID'
        required: true
      quality:
        description: 'Target height'
        required: true
      message_id:
        description: 'Progress message ID'
        required: true
      original_message_id:
        description: 'Original video message ID'
        required: true
      original_caption:
        description: 'Original video caption'
        required: false
        default: ''
      api_base_url:
        description: 'Local Bot API base URL'
        required: true

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      API_BASE_URL: ${{ github.event.inputs.api_base_url }}
      USER_CHAT_ID: ${{ github.event.inputs.user_id }}
      MSG_ID: ${{ github.event.inputs.message_id }}
      QUALITY: ${{ github.event.inputs.quality }}
      ORIGINAL_CAPTION: ${{ github.event.inputs.original_caption }}

    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq bc

      - name: Create output directory
        run: mkdir -p compress

      # ---------- Runner specs (with cancel button) ----------
      - name: Update Telegram with runner specs
        run: |
          CANCEL_KEYBOARD='{"inline_keyboard":[[{"text":"Cancel ❌","callback_data":"cancel_run_${{ github.run_id }}"}}]]}'
          CPU=$(lscpu | grep "Model name" | cut -d: -f2 | xargs)
          RAM=$(free -h | awk '/Mem:/ {print $2}')
          DISK=$(df -h / | awk 'NR==2 {print $2}')
          OS=$(cat /etc/os-release | grep PRETTY_NAME | cut -d'"' -f2)
          MESSAGE="🖥 *Runner Specs:*\n• OS: ${OS}\n• CPU: ${CPU}\n• RAM: ${RAM}\n• Storage: ${DISK}"
          curl -s -X POST "${API_BASE_URL}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
            -d "text=${MESSAGE}" -d "parse_mode=Markdown" \
            -d "reply_markup=${CANCEL_KEYBOARD}"

      # ---------- Download with progress + cancel button ----------
      - name: Download video
        id: download
        run: |
          CANCEL_KEYBOARD='{"inline_keyboard":[[{"text":"Cancel ❌","callback_data":"cancel_run_${{ github.run_id }}"}}]]}'
          FILE_PATH=$(curl -s "${API_BASE_URL}/getFile?file_id=${{ github.event.inputs.file_id }}" | jq -r '.result.file_path')
          if [ -z "$FILE_PATH" ]; then
            curl -s -X POST "${API_BASE_URL}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
              -d "text=❌ *Failed to get file path.*" -d "parse_mode=Markdown" \
              -d "reply_markup=${CANCEL_KEYBOARD}"
            exit 1
          fi
          OUTPUT="compress/original.mp4"
          curl -# -L -o "${OUTPUT}" "${API_BASE_URL}/file/${FILE_PATH}" 2>/tmp/download_progress.txt &
          CURL_PID=$!
          LAST_SIZE=0
          LAST_TIME=$(date +%s)
          while kill -0 $CURL_PID 2>/dev/null; do
            sleep 2
            if [ -f "${OUTPUT}" ]; then
              CURRENT_SIZE=$(stat -c%s "${OUTPUT}" 2>/dev/null || echo 0)
              NOW=$(date +%s)
              ELAPSED=$(( NOW - LAST_TIME ))
              if [ $ELAPSED -gt 0 ]; then
                SPEED_BYTES=$(( (CURRENT_SIZE - LAST_SIZE) / ELAPSED ))
                SPEED_MB=$(echo "scale=2; ${SPEED_BYTES}/1048576" | bc)
              else
                SPEED_MB=0
              fi
              TOTAL_SIZE=$(grep -i "content-length" /tmp/download_progress.txt | tail -1 | awk '{print $2}' | tr -d '\r')
              if [ -n "$TOTAL_SIZE" ]; then
                PERCENT=$(( CURRENT_SIZE * 100 / TOTAL_SIZE ))
                TOTAL_MB=$(echo "scale=2; ${TOTAL_SIZE}/1048576" | bc)
              else
                PERCENT=0
                TOTAL_MB="?"
              fi
              CUR_MB=$(echo "scale=2; ${CURRENT_SIZE}/1048576" | bc)
              BARS=20
              FILLED=$(( PERCENT * BARS / 100 ))
              BAR=$(printf "%0.s█" $(seq 1 $FILLED))
              BAR+=$(printf "%0.s░" $(seq 1 $((BARS - FILLED))))
              curl -s -X POST "${API_BASE_URL}/editMessageText" \
                -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
                -d "text=📥 *Downloading...* [${BAR}] ${PERCENT}%\n(${CUR_MB} / ${TOTAL_MB} MB)  ⚡ ${SPEED_MB} MB/s" \
                -d "parse_mode=Markdown" \
                -d "reply_markup=${CANCEL_KEYBOARD}"
              LAST_SIZE=$CURRENT_SIZE
              LAST_TIME=$NOW
            fi
          done
          wait $CURL_PID
          curl -s -X POST "${API_BASE_URL}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
            -d "text=✅ *Download complete!*" -d "parse_mode=Markdown" \
            -d "reply_markup=${CANCEL_KEYBOARD}"

      - name: Handle download failure
        if: failure()
        run: |
          curl -s -X POST "${API_BASE_URL}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
            -d "text=❌ *Download failed. Process stopped.*" -d "parse_mode=Markdown" \
            -d "reply_markup=${CANCEL_KEYBOARD}"
          exit 1

      # ---------- Verify file ----------
      - name: Verify file
        run: |
          CANCEL_KEYBOARD='{"inline_keyboard":[[{"text":"Cancel ❌","callback_data":"cancel_run_${{ github.run_id }}"}}]]}'
          if [ ! -f compress/original.mp4 ]; then
            curl -s -X POST "${API_BASE_URL}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
              -d "text=❌ *Verification failed.*" -d "parse_mode=Markdown" \
              -d "reply_markup=${CANCEL_KEYBOARD}"
            exit 1
          else
            SIZE=$(du -sh compress/original.mp4 | cut -f1)
            curl -s -X POST "${API_BASE_URL}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
              -d "text=✅ *File verified* (${SIZE})" -d "parse_mode=Markdown" \
              -d "reply_markup=${CANCEL_KEYBOARD}"
          fi

      # ---------- Compress with progress + cancel ----------
      - name: Compress video
        id: compress
        run: |
          CANCEL_KEYBOARD='{"inline_keyboard":[[{"text":"Cancel ❌","callback_data":"cancel_run_${{ github.run_id }}"}}]]}'
          echo "COMPRESS_START=$(date +%s)" >> $GITHUB_ENV
          curl -s -X POST "${API_BASE_URL}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
            -d "text=🎞 *Compressing to ${QUALITY}p...*" -d "parse_mode=Markdown" \
            -d "reply_markup=${CANCEL_KEYBOARD}"
          if ffmpeg -y -i compress/original.mp4 -vf "scale=-2:${QUALITY}" \
             -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k \
             compress/compressed.mp4 2>/tmp/ffmpeg.log; then
            ORIG_CAP="${ORIGINAL_CAPTION}"
            if [ -z "$ORIG_CAP" ]; then
              NEW_NAME="compressed_${QUALITY}p.mp4"
            else
              SANITIZED=$(echo "$ORIG_CAP" | tr -c 'a-zA-Z0-9_\-' '_' | cut -c1-100)
              NEW_NAME="${SANITIZED}_${QUALITY}p.mp4"
            fi
            mv compress/compressed.mp4 "compress/${NEW_NAME}"
            echo "COMPRESSED_NAME=${NEW_NAME}" >> $GITHUB_ENV
            curl -s -X POST "${API_BASE_URL}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
              -d "text=✅ *Compressed successfully!*" -d "parse_mode=Markdown" \
              -d "reply_markup=${CANCEL_KEYBOARD}"
          else
            FFLOG=$(tail -n 30 /tmp/ffmpeg.log)
            ESCAPED=$(python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" <<< "$FFLOG")
            curl -s -X POST "${API_BASE_URL}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
              -d "text=❌ *Compression failed!* Error log:\n\`\`\`${ESCAPED}\`\`\`" \
              -d "parse_mode=Markdown" \
              -d "reply_markup=${CANCEL_KEYBOARD}"
            exit 1
          fi

      # ---------- Upload artifact ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: compressed-${{ github.event.inputs.user_id }}-${{ github.event.inputs.message_id }}
          path: compress/${{ env.COMPRESSED_NAME }}
          retention-days: 7

      # ---------- Upload to Telegram with fallback bot ----------
      - name: Upload via channel + copy (fallback bot)
        id: upload
        env:
          COMPRESSED_NAME: ${{ env.COMPRESSED_NAME }}
          ORIGINAL_MSG_ID: ${{ github.event.inputs.original_message_id }}
          COMPRESS_START: ${{ env.COMPRESS_START }}
          CHANNEL_USERNAME: "compresslog"
          FALLBACK_BOT_TOKEN: ${{ secrets.FALLBACK_BOT_TOKEN }}
        run: |
          CANCEL_KEYBOARD='{"inline_keyboard":[[{"text":"Cancel ❌","callback_data":"cancel_run_${{ github.run_id }}"}}]]}'
          FILE="compress/${COMPRESSED_NAME}"
          if [ ! -f "$FILE" ]; then
            curl -s -X POST "${API_BASE_URL}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
              -d "text=❌ *Upload failed – file missing.*" -d "parse_mode=Markdown" \
              -d "reply_markup=${CANCEL_KEYBOARD}"
            exit 1
          fi
          COMPRESS_END=$(date +%s)
          ELAPSED=$(( COMPRESS_END - COMPRESS_START ))
          MINS=$(( ELAPSED / 60 ))
          SECS=$(( ELAPSED % 60 ))
          CAPTION="Quality: ${QUALITY}p | Time taken: ${MINS}m ${SECS}s"

          # 1. Send to channel (primary bot)
          CHANNEL_RESP=$(curl -s -o /tmp/channel_send.json -w "%{http_code}" \
            -F "video=@${FILE}" \
            -F "caption=${CAPTION}" \
            -F "chat_id=@${CHANNEL_USERNAME}" \
            "${API_BASE_URL}/sendVideo")
          if [ "$CHANNEL_RESP" != "200" ]; then
            curl -s -X POST "${API_BASE_URL}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
              -d "text=❌ *Failed to send to channel.*" -d "parse_mode=Markdown" \
              -d "reply_markup=${CANCEL_KEYBOARD}"
            exit 1
          fi
          CHANNEL_MSG_ID=$(jq -r '.result.message_id' /tmp/channel_send.json)

          # 2. Copy with retries, switching to fallback if needed
          SUCCESS=false
          for TOKEN in "$BOT_TOKEN" "$FALLBACK_BOT_TOKEN"; do
            for i in {1..10}; do
              RESP=$(curl -s -o /tmp/copy_resp.json -w "%{http_code}" \
                -d "chat_id=${USER_CHAT_ID}" \
                -d "from_chat_id=@${CHANNEL_USERNAME}" \
                -d "message_id=${CHANNEL_MSG_ID}" \
                -d "reply_to_message_id=${ORIGINAL_MSG_ID}" \
                "${API_BASE_URL}/copyMessage" \
                -H "Authorization: Bearer ${TOKEN}")
              if [ "$RESP" = "200" ]; then
                SUCCESS=true
                break
              elif grep -q "429" /tmp/copy_resp.json; then
                RETRY=$(jq -r '.parameters.retry_after // 5' /tmp/copy_resp.json)
                curl -s -X POST "${API_BASE_URL}/editMessageText" \
                  -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
                  -d "text=📤 *Rate‑limited.* Waiting ${RETRY}s..." -d "parse_mode=Markdown" \
                  -d "reply_markup=${CANCEL_KEYBOARD}"
                sleep $RETRY
              else
                break
              fi
            done
            if [ "$SUCCESS" = true ]; then
              break
            fi
          done

          if [ "$SUCCESS" != true ]; then
            curl -s -X POST "${API_BASE_URL}/editMessageText" \
              -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
              -d "text=❌ *Upload failed.*" -d "parse_mode=Markdown" \
              -d "reply_markup=${CANCEL_KEYBOARD}"
            exit 1
          fi

          # 3. Delete channel message & progress message
          curl -s -X POST "${API_BASE_URL}/deleteMessage" \
            -d "chat_id=@${CHANNEL_USERNAME}" -d "message_id=${CHANNEL_MSG_ID}"
          curl -s -X POST "${API_BASE_URL}/deleteMessage" \
            -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}"

      - name: Handle upload failure
        if: failure()
        run: |
          curl -s -X POST "${API_BASE_URL}/editMessageText" \
            -d "chat_id=${USER_CHAT_ID}" -d "message_id=${MSG_ID}" \
            -d "text=❌ *Upload failed.*" -d "parse_mode=Markdown" \
            -d "reply_markup=${CANCEL_KEYBOARD}"
          exit 1

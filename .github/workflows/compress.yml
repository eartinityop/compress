name: Video Compressor (Final – Smooth Local Progress)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'file_id of the video (belongs to the same bot)'
        required: true
      chat_id:
        description: 'Group chat ID'
        required: true
      original_message_id:
        description: 'Original message ID for reply'
        required: true
      quality:
        description: 'Target height (240/360/480/720/1080)'
        required: true
      custom_name:
        description: 'Custom file name'
        required: false
        default: 'video'
      original_caption:
        description: 'Original video caption'
        required: false
        default: ''

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}          # same as the frontend bot
      API_ID: ${{ secrets.API_ID }}
      API_HASH: ${{ secrets.API_HASH }}
      CHAT_ID: ${{ github.event.inputs.chat_id }}
      ORIGINAL_MSG_ID: ${{ github.event.inputs.original_message_id }}
      QUALITY: ${{ github.event.inputs.quality }}
      ORIGINAL_CAPTION: ${{ github.event.inputs.original_caption }}
      CUSTOM_NAME: ${{ github.event.inputs.custom_name }}
      BINARY_URL: "https://github.com/eartinityop/compress/releases/download/botapi-binary/telegram-bot-api-linux-amd64"

    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq bc python3-pip

      - name: Create working directory
        run: mkdir -p /tmp/telegram-bot-api compress

      - name: Download and start local Bot API server
        run: |
          wget -q -O telegram-bot-api "$BINARY_URL"
          chmod +x telegram-bot-api
          ./telegram-bot-api --api-id $API_ID --api-hash $API_HASH --http-port 8081 --dir /tmp/telegram-bot-api --local &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8081/getMe | grep -q '"ok":true'; then
              echo "Local API server ready."
              break
            fi
            sleep 1
          done

      - name: Send progress message (same bot)
        id: progress
        run: |
          BASE_URL="http://127.0.0.1:8081"
          RESP=$(curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            -d "text=⏳ Processing started..." \
            -d "parse_mode=Markdown")
          echo "PROGRESS_MSG_ID=$(echo "$RESP" | jq -r '.result.message_id')" >> $GITHUB_ENV

      - name: Download video (smooth local progress bar)
        id: download
        run: |
          BASE_URL="http://127.0.0.1:8081"
          FILE_PATH=$(curl -s "${BASE_URL}/bot${BOT_TOKEN}/getFile?file_id=${{ github.event.inputs.file_id }}" | jq -r '.result.file_path')
          if [ -z "$FILE_PATH" ] || [ "$FILE_PATH" = "null" ]; then
            curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
              -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
              -d "text=❌ Failed to get file path." -d "parse_mode=Markdown"
            exit 1
          fi

          OUTPUT="compress/original.mp4"

          if [[ "$FILE_PATH" = /* ]]; then
            # ----- Local mode: copy with slower block size, 2‑second updates -----
            TOTAL_SIZE=$(stat -c%s "$FILE_PATH")
            dd if="$FILE_PATH" of="$OUTPUT" bs=512K status=none &
            COPY_PID=$!

            LAST_SIZE=0
            LAST_TIME=$(date +%s)

            while kill -0 $COPY_PID 2>/dev/null; do
              sleep 2               # ← update every 2 seconds
              CURRENT_SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
              NOW=$(date +%s)
              ELAPSED=$(( NOW - LAST_TIME ))
              if [ $ELAPSED -gt 0 ]; then
                SPEED_BYTES=$(( (CURRENT_SIZE - LAST_SIZE) / ELAPSED ))
                SPEED_MB=$(echo "scale=2; ${SPEED_BYTES}/1048576" | bc)
              else
                SPEED_MB="0"
              fi
              PERCENT=$(( CURRENT_SIZE * 100 / TOTAL_SIZE ))
              TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)
              CUR_MB=$(echo "scale=2; $CURRENT_SIZE/1048576" | bc)
              BARS=20
              FILLED=$(( PERCENT * BARS / 100 ))
              BAR=$(printf "%0.s█" $(seq 1 $FILLED))
              BAR+=$(printf "%0.s░" $(seq 1 $((BARS - FILLED))))
              curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
                -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
                -d "text=📥 Downloading... [${BAR}] ${PERCENT}%\n(${CUR_MB} / ${TOTAL_MB} MB) ⚡ ${SPEED_MB} MB/s" \
                -d "parse_mode=Markdown"
              LAST_SIZE=$CURRENT_SIZE
              LAST_TIME=$NOW
            done
            wait $COPY_PID

            FINAL_SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
            if [ "$FINAL_SIZE" -lt 1024 ]; then
              curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
                -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
                -d "text=❌ Download failed – file too small (${FINAL_SIZE} bytes)." -d "parse_mode=Markdown"
              exit 1
            fi
          else
            # ----- Remote mode: standard curl download (7‑second updates) -----
            FILE_URL="${BASE_URL}/file/bot${BOT_TOKEN}/${FILE_PATH}"
            curl -# -L -o "$OUTPUT" "$FILE_URL" 2>/tmp/download_progress.txt &
            CURL_PID=$!

            LAST_SIZE=0
            LAST_TIME=$(date +%s)

            while kill -0 $CURL_PID 2>/dev/null; do
              sleep 7
              if [ -f "$OUTPUT" ]; then
                CURRENT_SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
                NOW=$(date +%s)
                ELAPSED=$(( NOW - LAST_TIME ))
                if [ $ELAPSED -gt 0 ]; then
                  SPEED_BYTES=$(( (CURRENT_SIZE - LAST_SIZE) / ELAPSED ))
                  SPEED_MB=$(echo "scale=2; ${SPEED_BYTES}/1048576" | bc)
                else
                  SPEED_MB="0"
                fi
                TOTAL_SIZE=$(grep -i "content-length" /tmp/download_progress.txt | tail -1 | awk '{print $2}' | tr -d '\r')
                if [ -n "$TOTAL_SIZE" ] && [ "$TOTAL_SIZE" -gt 0 ]; then
                  PERCENT=$(( CURRENT_SIZE * 100 / TOTAL_SIZE ))
                  TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)
                else
                  PERCENT=0
                  TOTAL_MB="?"
                fi
                CUR_MB=$(echo "scale=2; $CURRENT_SIZE/1048576" | bc)
                BARS=20
                FILLED=$(( PERCENT * BARS / 100 ))
                BAR=$(printf "%0.s█" $(seq 1 $FILLED))
                BAR+=$(printf "%0.s░" $(seq 1 $((BARS - FILLED))))
                curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
                  -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
                  -d "text=📥 Downloading... [${BAR}] ${PERCENT}%\n(${CUR_MB} / ${TOTAL_MB} MB) ⚡ ${SPEED_MB} MB/s" \
                  -d "parse_mode=Markdown"
                LAST_SIZE=$CURRENT_SIZE
                LAST_TIME=$NOW
              fi
            done
            wait $CURL_PID
            FINAL_SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
            if [ "$FINAL_SIZE" -lt 1024 ]; then
              curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
                -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
                -d "text=❌ Download failed – file too small (${FINAL_SIZE} bytes)." -d "parse_mode=Markdown"
              exit 1
            fi
          fi

          curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
            -d "text=✅ Download complete!" -d "parse_mode=Markdown"

      - name: Detect format and rename (only if file is valid)
        if: success()
        run: |
          ACTUAL_FORMAT=$(ffprobe -v error -show_entries format=format_name -of default=noprint_wrappers=1:nokey=1 compress/original.mp4 2>/dev/null || echo "")
          if echo "$ACTUAL_FORMAT" | grep -qE "matroska|webm"; then
            mv compress/original.mp4 compress/original.mkv
            echo "Renamed to original.mkv"
          fi

      - name: Compress video (metadata preserved)
        id: compress
        run: |
          BASE_URL="http://127.0.0.1:8081"
          curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
            -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
            -d "text=🎞 Compressing to ${QUALITY}p..." -d "parse_mode=Markdown"
          echo "COMPRESS_START=$(date +%s)" >> $GITHUB_ENV

          if [ -f compress/original.mkv ]; then
            INPUT="compress/original.mkv"
          else
            INPUT="compress/original.mp4"
          fi

          SAFE_NAME=$(echo "$CUSTOM_NAME" | sed 's/[^a-zA-Z0-9_\-]//g' | cut -c1-50)
          [ -z "$SAFE_NAME" ] && SAFE_NAME="video"
          FINAL_NAME="${SAFE_NAME}_${QUALITY}p.mp4"
          echo "COMPRESSED_NAME=${FINAL_NAME}" >> $GITHUB_ENV

          if ffmpeg -y -i "$INPUT" \
             -map_metadata 0 \
             -movflags +faststart \
             -vf "scale=-2:${QUALITY}" \
             -c:v libx264 -preset fast -crf 23 \
             -c:a aac -b:a 128k \
             "compress/${FINAL_NAME}" 2>/tmp/ffmpeg.log; then
            curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
              -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
              -d "text=✅ Compressed successfully!" -d "parse_mode=Markdown"
          else
            FFLOG=$(tail -n 20 /tmp/ffmpeg.log | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
            curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
              -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
              -d "text=❌ Compression failed! \`\`\`${FFLOG}\`\`\`" -d "parse_mode=Markdown"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: compressed-${{ github.event.inputs.chat_id }}-${{ github.run_id }}
          path: compress/${{ env.COMPRESSED_NAME }}
          retention-days: 7

      - name: Send compressed file to group (reply, same bot)
        env:
          COMPRESSED_NAME: ${{ env.COMPRESSED_NAME }}
          COMPRESS_START: ${{ env.COMPRESS_START }}
        run: |
          BASE_URL="http://127.0.0.1:8081"
          FILE="compress/${COMPRESSED_NAME}"
          [ ! -f "$FILE" ] && exit 1

          COMPRESS_END=$(date +%s)
          ELAPSED=$(( COMPRESS_END - COMPRESS_START ))
          MINS=$(( ELAPSED / 60 ))
          SECS=$(( ELAPSED % 60 ))
          CAPTION="Quality: ${QUALITY}p | Time: ${MINS}m ${SECS}s"
          [ -n "${ORIGINAL_CAPTION}" ] && CAPTION="${ORIGINAL_CAPTION} - ${CAPTION}"

          curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/sendVideo" \
            -F "chat_id=$CHAT_ID" \
            -F "video=@$FILE" \
            -F "caption=$CAPTION" \
            -F "reply_to_message_id=$ORIGINAL_MSG_ID" \
            -F "parse_mode=Markdown" > /tmp/send_resp.json

          if grep -q '"ok":true' /tmp/send_resp.json; then
            curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/deleteMessage" \
              -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID"
          else
            ERROR=$(jq -r '.description' /tmp/send_resp.json)
            curl -s -X POST "${BASE_URL}/bot${BOT_TOKEN}/editMessageText" \
              -d "chat_id=$CHAT_ID" -d "message_id=$PROGRESS_MSG_ID" \
              -d "text=❌ Upload failed: $ERROR" -d "parse_mode=Markdown"
            exit 1
          fi

name: Video Compressor (Final – Persistent Cancel + Fallback)

on:
  workflow_dispatch:
    inputs:
      channel_username:
        description: 'Private channel username (without @)'
        required: true
      fwd_message_id:
        description: 'Message ID of forwarded video in channel'
        required: true
      user_id:
        description: 'User chat ID'
        required: true
      quality:
        description: 'Target height (240/360/480/720/1080)'
        required: true
      message_id:
        description: 'Progress message ID'
        required: true
      original_message_id:
        description: 'Original video message ID (for reply)'
        required: true
      bot_username:
        description: 'Bot username (without @) – used for resolving chat in download'
        required: false
        default: ''
      original_caption:
        description: 'Original video caption'
        required: false
        default: ''

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      USER_CHAT_ID: ${{ github.event.inputs.user_id }}
      MSG_ID: ${{ github.event.inputs.message_id }}
      QUALITY: ${{ github.event.inputs.quality }}
      ORIGINAL_CAPTION: ${{ github.event.inputs.original_caption }}

    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq bc python3-pip

      - name: Install Python packages
        run: pip install pyrogram tgcrypto requests

      - name: Create output directory
        run: mkdir -p compress

      # ---------- Runner specs (Python – safe, persistent Cancel) ----------
      - name: Update Telegram with runner specs
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python -c "
          import os, requests, subprocess
          BOT_TOKEN = os.environ['BOT_TOKEN']
          CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          RUN_ID = os.environ['GITHUB_RUN_ID']

          cpu = subprocess.getoutput('lscpu | grep \"Model name\" | cut -d: -f2 | xargs')
          ram = subprocess.getoutput('free -h | awk \"/Mem:/ {print \\$2}\"')
          disk = subprocess.getoutput('df -h / | awk \"NR==2 {print \\$2}\"')
          os_name = subprocess.getoutput('cat /etc/os-release | grep PRETTY_NAME | cut -d\\\" -f2')
          text = f'🖥 *Runner Specs:*\n• OS: {os_name}\n• CPU: {cpu}\n• RAM: {ram}\n• Storage: {disk}'
          payload = {
              'chat_id': CHAT_ID,
              'message_id': MSG_ID,
              'text': text,
              'parse_mode': 'Markdown',
              'reply_markup': {
                  'inline_keyboard': [[{'text': 'Cancel ❌', 'callback_data': f'cancel_run_{RUN_ID}'}]]
              }
          }
          requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)
          "

      # ---------- Download (Python progress + persistent Cancel) ----------
      - name: Download video from channel using Pyrogram
        id: download
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_B64: ${{ secrets.USER_SESSION_BASE64 }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
          FWD_MSG_ID: ${{ github.event.inputs.fwd_message_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "$SESSION_B64" | base64 -d > my_account.session
          python -c "
          import os, asyncio, requests, time, sys
          from pyrogram import Client

          BOT_TOKEN = os.environ['BOT_TOKEN']
          USER_CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          CHANNEL_USERNAME = os.environ['CHANNEL_USERNAME']
          FWD_MSG_ID = int(os.environ['FWD_MSG_ID'])
          OUTPUT_FILE = 'compress/original.mp4'
          GITHUB_RUN_ID = os.environ['GITHUB_RUN_ID']

          state = {'last_bytes': 0, 'last_time': time.time()}

          def update_message(text):
              payload = {
                  'chat_id': USER_CHAT_ID,
                  'message_id': MSG_ID,
                  'text': text,
                  'parse_mode': 'Markdown',
                  'reply_markup': {
                      'inline_keyboard': [[
                          {'text': 'Cancel ❌', 'callback_data': f'cancel_run_{GITHUB_RUN_ID}'}
                      ]]
                  }
              }
              requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)

          async def progress(current, total):
              now = time.time()
              elapsed = now - state['last_time']
              if elapsed < 1: return
              speed = (current - state['last_bytes']) / elapsed if elapsed > 0 else 0
              speed_mb = speed / 1048576
              pct = int(current * 100 / total) if total else 0
              total_mb = total / 1048576
              cur_mb = current / 1048576
              bar_len = 20
              filled = int(pct * bar_len / 100)
              bar = '█' * filled + '░' * (bar_len - filled)
              update_message(
                  f'📥 *Downloading...* [{bar}] {pct}%\n'
                  f'({cur_mb:.1f} / {total_mb:.1f} MB)  ⚡ {speed_mb:.1f} MB/s'
              )
              state['last_time'] = now
              state['last_bytes'] = current

          async def main():
              app = Client('my_account', api_id=int(os.environ['API_ID']),
                           api_hash=os.environ['API_HASH'])
              await app.start()
              try:
                  channel = await app.get_chat(CHANNEL_USERNAME)
                  msg = await app.get_messages(channel.id, FWD_MSG_ID)
                  if not msg or not msg.media:
                      update_message('❌ *Video not found in channel.*')
                  else:
                      await msg.download(file_name=OUTPUT_FILE, progress=progress)
                      update_message('✅ *Download complete!*')
              except Exception as e:
                  with open('/tmp/download_err.log', 'w') as f:
                      import traceback
                      traceback.print_exc(file=f)
                  update_message(f'❌ *Download error:* {str(e)[:200]}')
                  sys.exit(1)
              await app.stop()

          asyncio.run(main())
          " 2>/tmp/download_err.log || true

      - name: Handle download failure
        if: failure() && steps.download.outcome == 'failure'
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          LOG=$(tail -n 20 /tmp/download_err.log 2>/dev/null || echo "No log captured")
          python -c "
          import os, requests, subprocess
          BOT_TOKEN = os.environ['BOT_TOKEN']
          CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          RUN_ID = os.environ['GITHUB_RUN_ID']
          log = '''${LOG}'''
          import json
          escaped = json.dumps(log)[1:-1]
          text = f'❌ *Download failed. Process stopped.*\n\`\`\`{escaped}\`\`\`'
          payload = {
              'chat_id': CHAT_ID,
              'message_id': MSG_ID,
              'text': text,
              'parse_mode': 'Markdown',
              'reply_markup': {
                  'inline_keyboard': [[{'text': 'Cancel ❌', 'callback_data': f'cancel_run_{RUN_ID}'}]]
              }
          }
          requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)
          "
          exit 1

      # ---------- Verify file (Python – persistent Cancel) ----------
      - name: Verify downloaded file exists
        id: verify
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python -c "
          import os, requests, subprocess
          BOT_TOKEN = os.environ['BOT_TOKEN']
          CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          RUN_ID = os.environ['GITHUB_RUN_ID']

          if not __import__('os').path.isfile('compress/original.mp4'):
              text = '❌ *Verification failed: original.mp4 not found.*'
              success = False
          else:
              size = subprocess.getoutput('du -sh compress/original.mp4 | cut -f1')
              text = f'✅ *File verified* ({size})'
              success = True
          payload = {
              'chat_id': CHAT_ID,
              'message_id': MSG_ID,
              'text': text,
              'parse_mode': 'Markdown',
              'reply_markup': {
                  'inline_keyboard': [[{'text': 'Cancel ❌', 'callback_data': f'cancel_run_{RUN_ID}'}]]
              }
          }
          requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)
          if not success:
              exit(1)
          "

      - name: Handle verification failure
        if: failure() && steps.verify.outcome == 'failure'
        run: exit 1

      # ---------- Compression (Python status updates) ----------
      - name: Compress video
        id: compress
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "COMPRESS_START=$(date +%s)" >> $GITHUB_ENV
          python -c "
          import os, requests
          BOT_TOKEN = os.environ['BOT_TOKEN']
          CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          RUN_ID = os.environ['GITHUB_RUN_ID']
          QUALITY = os.environ['QUALITY']
          payload = {
              'chat_id': CHAT_ID,
              'message_id': MSG_ID,
              'text': f'🎞 *Compressing to {QUALITY}p...*',
              'parse_mode': 'Markdown',
              'reply_markup': {
                  'inline_keyboard': [[{'text': 'Cancel ❌', 'callback_data': f'cancel_run_{RUN_ID}'}]]
              }
          }
          requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)
          "
          
          if ffmpeg -y -i compress/original.mp4 -vf "scale=-2:${QUALITY}" \
             -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k \
             compress/compressed.mp4 2>/tmp/ffmpeg.log; then
            python -c "
            import os, requests
            BOT_TOKEN = os.environ['BOT_TOKEN']
            CHAT_ID = os.environ['USER_CHAT_ID']
            MSG_ID = int(os.environ['MSG_ID'])
            RUN_ID = os.environ['GITHUB_RUN_ID']
            payload = {
                'chat_id': CHAT_ID,
                'message_id': MSG_ID,
                'text': '✅ *Compressed successfully!*',
                'parse_mode': 'Markdown',
                'reply_markup': {
                    'inline_keyboard': [[{'text': 'Cancel ❌', 'callback_data': f'cancel_run_{RUN_ID}'}]]
                }
            }
            requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)
            "
          else
            FFLOG=$(tail -n 30 /tmp/ffmpeg.log)
            python -c "
            import os, requests, sys
            BOT_TOKEN = os.environ['BOT_TOKEN']
            CHAT_ID = os.environ['USER_CHAT_ID']
            MSG_ID = int(os.environ['MSG_ID'])
            RUN_ID = os.environ['GITHUB_RUN_ID']
            log = '''${FFLOG}'''
            import json
            escaped = json.dumps(log)[1:-1]
            text = f'❌ *Compression failed!* Error log:\n\`\`\`{escaped}\`\`\`'
            payload = {
                'chat_id': CHAT_ID,
                'message_id': MSG_ID,
                'text': text,
                'parse_mode': 'Markdown',
                'reply_markup': {
                    'inline_keyboard': [[{'text': 'Cancel ❌', 'callback_data': f'cancel_run_{RUN_ID}'}]]
                }
            }
            requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)
            "
            exit 1
          fi

      - name: Handle compression failure
        if: failure() && steps.compress.outcome == 'failure'
        run: exit 1

      # ---------- Upload artifact ----------
      - name: Upload compressed video to artifact
        uses: actions/upload-artifact@v4
        with:
          name: compressed-${{ github.event.inputs.user_id }}-${{ github.event.inputs.message_id }}
          path: compress/compressed.mp4
          retention-days: 7

      # ---------- Upload to channel + copy with fallback ----------
      - name: Send to channel via user, then bot copies to user (with fallback)
        id: upload
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_B64: ${{ secrets.USER_SESSION_BASE64 }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FALLBACK_BOT_TOKEN: ${{ secrets.FALLBACK_BOT_TOKEN }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
          USER_CHAT_ID: ${{ github.event.inputs.user_id }}
          ORIGINAL_MSG_ID: ${{ github.event.inputs.original_message_id }}
          MSG_ID: ${{ github.event.inputs.message_id }}
          QUALITY: ${{ github.event.inputs.quality }}
          COMPRESS_START: ${{ env.COMPRESS_START }}
          ORIGINAL_CAPTION: ${{ github.event.inputs.original_caption }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "$SESSION_B64" | base64 -d > my_account.session
          python -c "
          import os, asyncio, time, requests
          from pyrogram import Client

          BOT_TOKEN = os.environ['BOT_TOKEN']
          FALLBACK_BOT_TOKEN = os.environ.get('FALLBACK_BOT_TOKEN', '')
          USER_CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          QUALITY = os.environ['QUALITY']
          COMPRESS_START = int(os.environ['COMPRESS_START'])
          ORIGINAL_MSG_ID = int(os.environ['ORIGINAL_MSG_ID'])
          CHANNEL_USERNAME = os.environ['CHANNEL_USERNAME']
          FILE_PATH = 'compress/compressed.mp4'
          ORIGINAL_CAPTION = os.environ.get('ORIGINAL_CAPTION', '')
          GITHUB_RUN_ID = os.environ['GITHUB_RUN_ID']

          def update_message(text):
              payload = {
                  'chat_id': USER_CHAT_ID,
                  'message_id': MSG_ID,
                  'text': text,
                  'parse_mode': 'Markdown',
                  'reply_markup': {
                      'inline_keyboard': [[
                          {'text': 'Cancel ❌', 'callback_data': f'cancel_run_{GITHUB_RUN_ID}'}
                      ]]
                  }
              }
              requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)

          async def try_copy(bot_token, chat_id, from_chat_id, message_id, reply_to):
              for attempt in range(10):
                  resp = requests.post(
                      f'https://api.telegram.org/bot{bot_token}/copyMessage',
                      json={
                          'chat_id': int(chat_id),
                          'from_chat_id': from_chat_id,
                          'message_id': message_id,
                          'reply_to_message_id': reply_to
                      }
                  ).json()
                  if resp.get('ok'):
                      return True
                  elif resp.get('error_code') == 429:
                      retry_after = resp.get('parameters', {}).get('retry_after', 5)
                      update_message(f'📤 *Rate‑limited.* Waiting {retry_after}s...')
                      await asyncio.sleep(retry_after)
                  else:
                      return False
              return False

          async def main():
              if not os.path.exists(FILE_PATH):
                  update_message('❌ *Upload failed – compressed file missing.*')
                  raise Exception('Compressed file missing')

              update_message('📤 *Uploading...*')
              app = Client('my_account', api_id=int(os.environ['API_ID']),
                           api_hash=os.environ['API_HASH'])
              await app.start()
              sent_channel_msg = None
              try:
                  channel = await app.get_chat(CHANNEL_USERNAME)
                  end_time = time.time()
                  elapsed = int(end_time - COMPRESS_START)
                  mins, sec = divmod(elapsed, 60)

                  # Build final caption
                  if ORIGINAL_CAPTION:
                      caption = f'{ORIGINAL_CAPTION} - {QUALITY}p'
                  else:
                      caption = f'{QUALITY}p'
                  caption += f' | Time taken: {mins}m {sec}s'

                  sent_channel_msg = await app.send_document(
                      chat_id=channel.id,
                      document=FILE_PATH,
                      caption=caption
                  )
                  if not sent_channel_msg or not hasattr(sent_channel_msg, 'id'):
                      raise Exception('Failed to send to channel')

                  # Try primary bot first, then fallback
                  success = await try_copy(BOT_TOKEN, USER_CHAT_ID, channel.id,
                                           sent_channel_msg.id, ORIGINAL_MSG_ID)
                  if not success and FALLBACK_BOT_TOKEN:
                      update_message('📤 *Switching to fallback bot...*')
                      success = await try_copy(FALLBACK_BOT_TOKEN, USER_CHAT_ID, channel.id,
                                               sent_channel_msg.id, ORIGINAL_MSG_ID)

                  if not success:
                      raise Exception('Both bots failed to copy the message')

                  await app.delete_messages(chat_id=channel.id, message_ids=sent_channel_msg.id)

                  update_message('📤 *Upload complete!*')
                  await asyncio.sleep(1)
                  await app.delete_messages(chat_id=int(USER_CHAT_ID), message_ids=MSG_ID)

              except Exception as e:
                  update_message(f'❌ *Upload failed:* {str(e)[:200]}')
                  raise
              finally:
                  await app.stop()

          asyncio.run(main())
          " 2>/tmp/upload_err.log

      - name: Handle upload failure
        if: failure() && steps.upload.outcome == 'failure'
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          LOG=$(tail -n 20 /tmp/upload_err.log 2>/dev/null || echo "No log captured")
          python -c "
          import os, requests, subprocess
          BOT_TOKEN = os.environ['BOT_TOKEN']
          CHAT_ID = os.environ['USER_CHAT_ID']
          MSG_ID = int(os.environ['MSG_ID'])
          RUN_ID = os.environ['GITHUB_RUN_ID']
          log = '''${LOG}'''
          import json
          escaped = json.dumps(log)[1:-1]
          text = f'❌ *Upload failed.* Error log:\n\`\`\`{escaped}\`\`\`'
          payload = {
              'chat_id': CHAT_ID,
              'message_id': MSG_ID,
              'text': text,
              'parse_mode': 'Markdown',
              'reply_markup': {
                  'inline_keyboard': [[{'text': 'Cancel ❌', 'callback_data': f'cancel_run_{RUN_ID}'}]]
              }
          }
          requests.post(f'https://api.telegram.org/bot{BOT_TOKEN}/editMessageText', json=payload)
          "
          exit 1
